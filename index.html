<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Transcription Pro</title>
    <link rel="stylesheet" href="/src/style.css?v=3">
</head>

<body>
    <div class="notification" id="notification">
        <div class="notification-title">Notification</div>
        <div class="notification-message">Message body goes here</div>
    </div>

    <div class="container">
        <header>
            <h1>AI Transcription</h1>
            <p class="subtitle">Real-time Professional Speech-to-Text</p>
        </header>

        <div class="status-bar">
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
            <div class="ping-display" id="pingDisplay" title="Round-trip latency">
                Ping: --
            </div>
            <div class="audio-info">
                16kHz • Mono
            </div>
        </div>

        <div class="visualizer" id="visualizer">
            <!-- Bars generated by JS -->
        </div>

        <div class="controls">
            <div class="mic-source-control">
                <label class="toggle-switch">
                    <input type="checkbox" id="micSourceToggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label" id="micSourceLabel">Use ESP Mic</span>
            </div>
            <button id="startBtn" class="btn btn-primary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Start Recording
            </button>
            <button id="stopBtn" class="btn btn-danger" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
                Stop
            </button>
            <button id="clearBtn" class="btn btn-secondary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                Clear
            </button>
        </div>

        <div class="esp-display-control">
            <label for="espDisplayModeSelect" class="esp-display-label">ESP Display</label>
            <select id="espDisplayModeSelect" class="lang-select">
                <option value="original">Original (Thô)</option>
                <option value="translated">Translated (Đã dịch)</option>
            </select>
        </div>

        <div class="translation-controls">
            <div class="source-lang-control">
                <label for="sourceLangSelect" class="source-lang-label">Source</label>
                <select id="sourceLangSelect" class="lang-select">
                    <option value="auto">Auto Detect</option>
                    <option value="vi">Vietnamese</option>
                    <option value="en">English</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="es">Spanish</option>
                    <option value="pt">Portuguese</option>
                    <option value="ru">Russian</option>
                    <option value="ar">Arabic</option>
                    <option value="th">Thai</option>
                    <option value="it">Italian</option>
                    <option value="ms">Malay</option>
                    <option value="id">Indonesian</option>
                    <option value="hi">Hindi</option>
                    <option value="tr">Turkish</option>
                    <option value="pl">Polish</option>
                    <option value="nl">Dutch</option>
                    <option value="uk">Ukrainian</option>
                    <option value="cs">Czech</option>
                </select>
            </div>

            <label class="toggle-switch">
                <input type="checkbox" id="translateToggle">
                <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label" id="toggleLabel">Translation Off</span>

            <select id="langSelect" class="lang-select" disabled>
                <option value="vi">Vietnamese</option>
                <option value="en">English</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="es">Spanish</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ar">Arabic</option>
                <option value="th">Thai</option>
                <option value="it">Italian</option>
                <option value="ms">Malay</option>
                <option value="id">Indonesian</option>
                <option value="hi">Hindi</option>
                <option value="tr">Turkish</option>
                <option value="pl">Polish</option>
                <option value="nl">Dutch</option>
                <option value="uk">Ukrainian</option>
                <option value="cs">Czech</option>
                <option value="zh-Hant">Traditional Chinese</option>
                <option value="tl">Filipino</option>
                <option value="km">Khmer</option>
                <option value="my">Burmese</option>
                <option value="fa">Persian</option>
                <option value="bn">Bengali</option>
                <option value="ta">Tamil</option>
                <option value="he">Hebrew</option>
                <option value="mn">Mongolian</option>
                <option value="yue">Cantonese</option>
            </select>

            <div class="context-control">
                <label for="contextSlider" class="context-label">Context</label>
                <input type="range" id="contextSlider" min="0" max="20" value="6" class="context-slider" disabled>
                <span id="contextValue" class="context-value">6</span>
            </div>
        </div>

        <div class="transcripts" id="transcriptsContainer">
            <div class="transcript-column" id="originalColumn">
                <div class="column-header">Original</div>
                <div class="transcript-scroll-area" id="transcriptScroll">
                    <div id="finalTranscript">
                        <!-- Final transcripts appear here -->
                    </div>
                </div>
                <div class="partial-container">
                    <span class="partial-label">Status</span>
                    <div class="partial-text" id="partialText">Ready</div>
                </div>
            </div>
            <div class="transcript-column translation-column hidden" id="translationColumn">
                <div class="column-header">Translation</div>
                <div class="transcript-scroll-area" id="translationScroll">
                    <div id="translatedTranscript">
                        <!-- Translated transcripts appear here -->
                    </div>
                </div>
                <div class="partial-container translation-partial">
                    <span class="partial-label">Status</span>
                    <div class="partial-text" id="translationStatus">Translation off</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/src/main.js?v=3"></script>
</body>

</html>
